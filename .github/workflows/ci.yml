name: Repo Checks

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  repo-checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure forbidden files are not tracked
        shell: bash
        run: |
          set -euo pipefail
          forbidden_regex='(^|/)(age-key\.txt|.*\.key|.*\.pem|.*\.p12|.*\.pfx|.*\.age|.*\.agekey|immich_backup_.*\.sql|modules/mod-playerbots/data/sql/playerbots/base/playerbots_travelnode_path\.sql)$'
          if git ls-files | grep -E "$forbidden_regex"; then
            echo "Forbidden files are tracked. Remove them before merging."
            exit 1
          fi

      - name: Install kustomize
        shell: bash
        run: |
          set -euo pipefail
          KUSTOMIZE_VERSION="5.5.0"
          curl -fsSL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv${KUSTOMIZE_VERSION}/kustomize_v${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" -o /tmp/kustomize.tgz
          tar -xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize
          kustomize version

      - name: Render Flux entrypoint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .work
          kustomize build --load-restrictor LoadRestrictionsNone clusters/home > .work/rendered.yaml
          test -s .work/rendered.yaml

      - name: Install kubeconform
        shell: bash
        run: |
          set -euo pipefail
          KUBECONFORM_VERSION="0.6.7"
          curl -fsSL "https://github.com/yannh/kubeconform/releases/download/v${KUBECONFORM_VERSION}/kubeconform-linux-amd64.tar.gz" -o /tmp/kubeconform.tgz
          tar -xzf /tmp/kubeconform.tgz -C /tmp
          sudo mv /tmp/kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate rendered manifests
        shell: bash
        run: |
          set -euo pipefail
          kubeconform -strict -ignore-missing-schemas -kubernetes-version 1.34.0 .work/rendered.yaml

      - name: Check unresolved Secret references
        shell: bash
        run: |
          set -euo pipefail
          python3 -m pip install --quiet pyyaml
          python3 scripts/ci/check_secret_refs.py .work/rendered.yaml
